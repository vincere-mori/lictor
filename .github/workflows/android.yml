name: android

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run build
        env:
          LICTOR_TARGET: cap
      - run: npx cap sync android
      - name: Decode keystore
        run: echo "${{ secrets.LICTOR_KEYSTORE_B64 }}" | base64 -d > android/app/lictor-release.jks
      - run: chmod +x android/gradlew
      - run: ./gradlew assembleRelease --no-daemon
        working-directory: android
        env:
          LICTOR_KEYSTORE_FILE: lictor-release.jks
          LICTOR_KEYSTORE_PASSWORD: ${{ secrets.LICTOR_KEYSTORE_PASSWORD }}
          LICTOR_KEY_ALIAS: ${{ secrets.LICTOR_KEY_ALIAS }}
          LICTOR_KEY_PASSWORD: ${{ secrets.LICTOR_KEY_PASSWORD }}
      - run: cp android/app/build/outputs/apk/release/app-release.apk lictor-release.apk
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: lictor-release.apk
